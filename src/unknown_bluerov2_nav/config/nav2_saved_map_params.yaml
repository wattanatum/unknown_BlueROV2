map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: "/home/ghosts/unknown_bluerov2_ws/src/unknown_bluerov2_nav/maps/bluerov2_slam_map.yaml"


amcl:
  ros__parameters:
    use_sim_time: true

    tf_broadcast: true

    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false

    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"

    scan_topic: /scan

    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # Fewer AMCL arrows / particles in RViz
    min_particles: 120
    max_particles: 500
    kld_err: 0.05
    kld_z: 0.99

    update_min_d: 0.05
    update_min_a: 0.05
    resample_interval: 1

    transform_tolerance: 2.0

    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_max_range: 5.0
    laser_min_range: 0.15
    max_beams: 60

    z_hit: 0.8
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.1
    sigma_hit: 0.2
    lambda_short: 0.1

    save_pose_rate: 0.5


controller_server:
  ros__parameters:
    use_sim_time: true

    controller_frequency: 10.0

    # Important: use EKF odometry
    odom_topic: /odometry/filtered

    enable_stamped_cmd_vel: false

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    # Let controller fail faster so recovery can run
    failure_tolerance: 0.5

    progress_checker_plugin: progress_checker
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.04
      movement_time_allowance: 15.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.45
      yaw_goal_tolerance: 0.60

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false

      # Allow only small backward movement
      # This helps when path is opposite robot heading
      min_vel_x: -0.015
      max_vel_x: 0.08

      min_vel_y: 0.0
      max_vel_y: 0.0

      max_vel_theta: 0.10

      min_speed_xy: 0.0
      max_speed_xy: 0.08
      min_speed_theta: 0.0

      acc_lim_x: 0.045
      acc_lim_y: 0.0
      acc_lim_theta: 0.06

      decel_lim_x: -0.045
      decel_lim_y: 0.0
      decel_lim_theta: -0.06

      vx_samples: 18
      vy_samples: 1
      vtheta_samples: 28

      sim_time: 3.0
      linear_granularity: 0.035
      angular_granularity: 0.025

      transform_tolerance: 0.5

      xy_goal_tolerance: 0.45
      trans_stopped_velocity: 0.02

      short_circuit_trajectory_evaluation: false
      stateful: true

      critics: [
        "RotateToGoal",
        "Oscillation",
        "BaseObstacle",
        "PreferForward",
        "GoalAlign",
        "PathAlign",
        "PathDist",
        "GoalDist"
      ]

      BaseObstacle.scale: 6.0

      # Important:
      # Penalize backward movement, but do not fully block it.
      # If robot moves backward too much, increase this to 8.0 or 10.0.
      PreferForward.scale: 5.0

      PathAlign.scale: 1.4
      PathAlign.forward_point_distance: 0.7

      GoalAlign.scale: 1.0
      GoalAlign.forward_point_distance: 0.7

      PathDist.scale: 10.0
      GoalDist.scale: 8.0

      RotateToGoal.scale: 1.2
      RotateToGoal.slowing_factor: 8.0
      RotateToGoal.lookahead_time: -1.0

smoother_server:
  ros__parameters:
    use_sim_time: true

    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true


planner_server:
  ros__parameters:
    use_sim_time: true

    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"

      # Larger tolerance helps narrow/corner areas.
      tolerance: 0.6
      use_astar: true

      # Keep true for narrow mapping spaces.
      # If it plans through unmapped bad area, change to false.
      allow_unknown: true


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true

      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 2.0

      update_frequency: 10.0
      publish_frequency: 5.0

      rolling_window: true
      width: 7
      height: 7
      resolution: 0.05

      # Narrow-passage setting.
      # Small enough to move through gaps.
      robot_radius: 0.34
      footprint_padding: 0.03

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        combination_method: 1

        observation_sources: scan

        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true

          obstacle_min_range: 0.15
          obstacle_max_range: 4.5

          raytrace_min_range: 0.15
          raytrace_max_range: 5.0

          max_obstacle_height: 3.0
          min_obstacle_height: -3.0

          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true

        # Narrow corridor tuning.
        # Smaller inflation allows passage.
        inflation_radius: 0.55
        cost_scaling_factor: 4.0

      always_send_full_costmap: true


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true

      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 2.0

      update_frequency: 2.0
      publish_frequency: 1.0

      rolling_window: false
      resolution: 0.05

      # Slightly bigger than local, still allows narrow path.
      robot_radius: 0.36
      footprint_padding: 0.03

      track_unknown_space: true

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        combination_method: 1

        observation_sources: scan

        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true

          obstacle_min_range: 0.15
          obstacle_max_range: 4.5

          raytrace_min_range: 0.15
          raytrace_max_range: 5.0

          max_obstacle_height: 3.0
          min_obstacle_height: -3.0

          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true

        # Global path still can use narrow corridors.
        inflation_radius: 0.70
        cost_scaling_factor: 3.5

      always_send_full_costmap: true


bt_navigator:
  ros__parameters:
    use_sim_time: true

    global_frame: map
    robot_base_frame: base_link

    # Important: use EKF odometry
    odom_topic: /odometry/filtered

    bt_loop_duration: 20
    default_server_timeout: 20
    wait_for_service_timeout: 1000

    navigators: ["navigate_to_pose", "navigate_through_poses"]

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"

    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

    # This BT includes recovery behaviors.
    # Normal DWB is forward-only, but recovery can BackUp.
    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"

    error_code_names:
      - compute_path_error_code
      - follow_path_error_code


behavior_server:
  ros__parameters:
    use_sim_time: true

    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 2.0
    cycle_frequency: 10.0

    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint

    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"

    backup:
      plugin: "nav2_behaviors::BackUp"

    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"

    wait:
      plugin: "nav2_behaviors::Wait"


waypoint_follower:
  ros__parameters:
    use_sim_time: true