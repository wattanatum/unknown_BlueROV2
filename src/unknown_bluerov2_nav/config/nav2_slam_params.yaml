controller_server:
  ros__parameters:
    use_sim_time: true

    controller_frequency: 10.0
    odom_topic: /odom
    enable_stamped_cmd_vel: false

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 1.0

    progress_checker_plugin: progress_checker
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.03
      movement_time_allowance: 90.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.45
      yaw_goal_tolerance: 0.55

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false

      min_vel_x: 0.0
      max_vel_x: 0.08

      min_vel_y: 0.0
      max_vel_y: 0.0

      max_vel_theta: 0.12

      min_speed_xy: 0.0
      max_speed_xy: 0.08
      min_speed_theta: 0.0

      acc_lim_x: 0.05
      acc_lim_y: 0.0
      acc_lim_theta: 0.10

      decel_lim_x: -0.05
      decel_lim_y: 0.0
      decel_lim_theta: -0.10

      vx_samples: 8
      vy_samples: 1
      vtheta_samples: 12

      sim_time: 2.0
      linear_granularity: 0.05
      angular_granularity: 0.03

      transform_tolerance: 0.5
      xy_goal_tolerance: 0.45
      trans_stopped_velocity: 0.02

      short_circuit_trajectory_evaluation: false
      stateful: true

      critics: [
        "RotateToGoal",
        "Oscillation",
        "BaseObstacle",
        "GoalAlign",
        "PathAlign",
        "PathDist",
        "GoalDist"
      ]

      BaseObstacle.scale: 0.80

      PathAlign.scale: 10.0
      PathAlign.forward_point_distance: 0.5

      GoalAlign.scale: 8.0
      GoalAlign.forward_point_distance: 0.5

      PathDist.scale: 12.0
      GoalDist.scale: 10.0

      RotateToGoal.scale: 6.0
      RotateToGoal.slowing_factor: 8.0
      RotateToGoal.lookahead_time: -1.0


smoother_server:
  ros__parameters:
    use_sim_time: true

    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true


planner_server:
  ros__parameters:
    use_sim_time: true

    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 1.0
      use_astar: true
      allow_unknown: true


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true

      global_frame: odom
      robot_base_frame: base_link

      update_frequency: 10.0
      publish_frequency: 5.0

      rolling_window: true
      width: 7
      height: 7
      resolution: 0.05

      robot_radius: 0.35

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        combination_method: 1

        observation_sources: scan

        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true

          obstacle_min_range: 0.15
          obstacle_max_range: 4.5

          raytrace_min_range: 0.15
          raytrace_max_range: 5.0

          max_obstacle_height: 3.0
          min_obstacle_height: -3.0

          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 4.0

      always_send_full_costmap: true


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true

      global_frame: map
      robot_base_frame: base_link

      update_frequency: 2.0
      publish_frequency: 1.0

      rolling_window: true
      width: 20
      height: 20
      resolution: 0.05

      robot_radius: 0.35

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        combination_method: 1

        observation_sources: scan

        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true

          obstacle_min_range: 0.15
          obstacle_max_range: 4.5

          raytrace_min_range: 0.15
          raytrace_max_range: 5.0

          max_obstacle_height: 3.0
          min_obstacle_height: -3.0

          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.65
        cost_scaling_factor: 4.0

      always_send_full_costmap: true


bt_navigator:
  ros__parameters:
    use_sim_time: true

    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom

    bt_loop_duration: 20
    default_server_timeout: 20
    wait_for_service_timeout: 1000

    navigators: ["navigate_to_pose", "navigate_through_poses"]

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"

    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"

    error_code_names:
      - compute_path_error_code
      - follow_path_error_code


behavior_server:
  ros__parameters:
    use_sim_time: true

    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5
    cycle_frequency: 10.0

    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint

    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"

    backup:
      plugin: "nav2_behaviors::BackUp"

    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"

    wait:
      plugin: "nav2_behaviors::Wait"


waypoint_follower:
  ros__parameters:
    use_sim_time: true
